upload_max_filesize = 16M
post_max_size = 64M
memory_limit = 1024M
max_execution_time = 60
expose_php = Off

log_errors = On
error_log = /var/log/php_errors.log
display_errors = On
error_reporting = E_ALL

; Permite uso de shell_exec para Tinker e Artisan
disable_functions = exec,passthru,system,parse_ini_file,show_source

date.timezone = America/Bahia

; OPcache otimizado para ambiente local
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=10000
opcache.validate_timestamps=1
opcache.revalidate_freq=2

; Xdebug para debug e coverage
xdebug.mode=debug,coverage
xdebug.start_with_request=yes
xdebug.discover_client_host=1
