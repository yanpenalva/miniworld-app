name: Docker Publish

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]*"
            - "V[0-9]+.[0-9]+.[0-9]*"

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract tag
              id: meta
              run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/miniworld-app:${{ steps.meta.outputs.tag }}
                      ${{ secrets.DOCKERHUB_USERNAME }}/miniworld-app:latest
